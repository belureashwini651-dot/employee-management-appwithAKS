name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: employeemanagementapplicationwithaks.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t employeemanagementapplicationwithaks.azurecr.io/springboot-postgres-app:v1 .

      - name: Push Docker Image
        run: |
          docker push employeemanagementapplicationwithaks.azurecr.io/springboot-postgres-app:v1
